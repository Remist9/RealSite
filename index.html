<!doctype html>
<html lang="ru">
  <head>
    <script type="module" src="/src/main.js" defer></script>

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
      charset="UTF-8"
    />

    <title>RealSite</title>
    <link rel="stylesheet" href="/style.css" />
  </head>

  <body class="h-dvh overflow-hidden m-0 bg-zinc-100">
    <!-- центрирующий wrapper -->
    <div class="h-full flex justify-center">

      <!-- контейнер приложения -->
      <div
        class="
          h-full
          w-full
          2xl:max-w-[1700px]
          bg-white
          flex
          flex-col
          shadow-2xl
        "
      >
        <!-- ================= ПК: ВЕРХНЯЯ ПАНЕЛЬ ================= -->
<header
  class="
    hidden lg:flex h-14
    bg-zinc-400
    border-b-2 border-zinc-500
    
    px-6 items-center
  "
>
        <div class="flex items-center gap-6">
          <!-- ЛОГОТИП -->
<button
  data-page="sale"
  class="
    nav-btn
    text-[17px]
    font-medium
    tracking-tight
  "
>
  Логотип
</button>

          <!-- КАТАЛОГ -->
<button
  data-page="catalog"
  class="
    nav-btn
    group
    flex items-center gap-2
    text-[17px]
    font-medium
    tracking-tight
  "
>
  <img
    src="/src/server/app/assets/icons/catalog.svg"
    alt=""
    class="
      w-5 h-5
      transition duration-200
      group-hover:scale-110
    "
  />

  <span>Каталог</span>
</button>
        </div>
                  
                  <div class="flex-1 flex justify-center">
                    <div class="w-1/2">
          <input
            type="text"
            placeholder="Поиск"
            class="w-full h-9 px-3 rounded-md bg-white text-sm outline-none focus:ring-2 focus:ring-blue-600"
          />
        </div>
                  </div>

<div class="flex gap-6">
<button
  data-page="cart"
  class="
    nav-btn
    group
    flex items-center gap-2
    text-[17px]
    font-medium
    tracking-tight
  "
>
  <img
    src="/src/server/app/assets/icons/cart.svg"
    alt=""
    class="
      w-5 h-5
      transition duration-200
      group-hover:scale-110
    "
  />

  <span>Корзина</span>
</button>

<button
  data-page="profile"
  class="
    nav-btn
    text-[17px]
    font-medium
    tracking-tight
  "
>
    Личный кабинет
  </button>
</div>

        </header>

        <!-- ================= ОСНОВНОЙ КОНТЕНТ ================= -->
        <div
          id="main_box"
          class="flex-1 bg-red-500 transition-colors duration-300 overflow-y-auto min-h-0"
        ></div>

        <!-- ================= МОБИЛКА: НИЖНЯЯ НАВИГАЦИЯ ================= -->
        <nav class="lg:hidden flex h-16 bg-gray-200 border-black">
          <div class="flex-1 flex items-center justify-center">
            <button data-page="sale" class="nav-btn group">
              <img
                src="/src/server/app/assets/icons/sale.svg"
                alt="Скидки"
                class="  w-8 h-8
  transition-all duration-200
  group-hover:invert"
              />
            </button>
          </div>

          <div class="flex-1 flex items-center justify-center">
            <button data-page="catalog" class="nav-btn group">
              <img
                src="/src/server/app/assets/icons/catalog.svg"
                alt="Каталог"
                class="      w-8 h-8
  transition-all duration-200
  group-hover:invert"
              />
            </button>
          </div>

          <div class="flex-1 flex items-center justify-center">
            <button data-page="cart" class="nav-btn group">
              <img
                src="/src/server/app/assets/icons/cart.svg"
                alt="Корзина"
                class="      w-8 h-8
  transition-all duration-200
  group-hover:invert"
              />
            </button>
          </div>

          <div class="flex-1 flex items-center justify-center">
            <button data-page="profile" class="nav-btn group">
              <img
                src="/src/server/app/assets/icons/profile.svg"
                alt="Профиль"
                class="      w-8 h-8
  transition-all duration-200
  group-hover:invert"
              />
            </button>
            </div>
        </nav>
      </div>
    </div>
  </body>
</html>
