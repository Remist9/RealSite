<!doctype html>
<html lang="ru">
  <head>
    <script type="module" src="/src/main.js" defer></script>

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
      charset="UTF-8"
    />

    <title>RealSite</title>
    <link rel="stylesheet" href="/style.css" />
  </head>

  <body class="h-dvh overflow-hidden m-0 bg-linear-to-br from-blue200 to-blue-700">
    <!-- центрирующий wrapper -->
    <div class="h-full flex justify-center">

      <!-- контейнер приложения -->
      <div
        class="
          h-full
          w-full
          lg:max-w-6xl
          bg-black/60
          flex
          flex-col
          shadow-2xl
        "
      >
        <!-- ================= ПК: ВЕРХНЯЯ ПАНЕЛЬ ================= -->
        <header
          class="hidden lg:flex h-14 bg-blue-400 border-b border-black px-6 items-center"
        >
          <button data-page="catalog" class="nav-btn font-medium hover:underline"><div class="font-bold text-lg">Логотип</div></button>
          
          <div class="flex-1 flex justify-center">
            <div class="w-1/2">
  <input
    type="text"
    placeholder="Поиск"
    class="w-full h-9 px-3 rounded-md bg-white text-sm outline-none focus:ring-2 focus:ring-blue-600"
  />
</div>
          </div>

<div class="flex gap-6">
  <button
    data-page="cart"
    class="nav-btn font-medium hover:underline"
  >
    Корзина
  </button>

  <button
    data-page="profile"
    class="nav-btn font-medium hover:underline"
  >
    Личный кабинет
  </button>
</div>

        </header>

        <!-- ================= ОСНОВНОЙ КОНТЕНТ ================= -->
        <div
          id="main_box"
          class="flex-1 bg-red-500 transition-colors duration-300 overflow-y-auto min-h-0"
        ></div>

        <!-- ================= МОБИЛКА: НИЖНЯЯ НАВИГАЦИЯ ================= -->
        <nav class="lg:hidden flex h-16 bg-gray-200 border-black">
          <div class="flex-1 flex items-center justify-center">
            <button data-page="sale" class="nav-btn text-5xl sm:text-3xl">🏷️</button>
          </div>
          <div class="flex-1 flex items-center justify-center">
            <button data-page="catalog" class="nav-btn text-5xl sm:text-3xl">📦</button>
          </div>
          <div class="flex-1 flex items-center justify-center">
            <button data-page="cart" class="nav-btn text-5xl sm:text-3xl">🛒</button>
          </div>
          <div class="flex-1 flex items-center justify-center">
            <button data-page="profile" class="nav-btn text-5xl sm:text-3xl">👤</button>
          </div>
        </nav>
      </div>
    </div>
  </body>
</html>
